{% extends "base.html" %}

{% block title %}Logs - Mini SIEM{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2><i class="bi bi-file-text"></i> Log Explorer</h2>
    </div>
</div>

<!-- Filters -->
<div class="card mb-4">
    <div class="card-header">
        <h5><i class="bi bi-funnel"></i> Filters</h5>
    </div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="filterUsername" placeholder="Enter username">
            </div>
            <div class="col-md-3">
                <label class="form-label">Source IP</label>
                <input type="text" class="form-control" id="filterIP" placeholder="Enter IP address">
            </div>
            <div class="col-md-2">
                <label class="form-label">Event Type</label>
                <select class="form-select" id="filterEventType">
                    <option value="">All</option>
                    <option value="authentication">Authentication</option>
                    <option value="failed_authentication">Failed Auth</option>
                    <option value="successful_authentication">Successful Auth</option>
                    <option value="port_scan">Port Scan</option>
                    <option value="privilege_escalation">Privilege Escalation</option>
                    <option value="file_access">File Access</option>
                    <option value="system_event">System Event</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Severity</label>
                <select class="form-select" id="filterSeverity">
                    <option value="">All</option>
                    <option value="critical">Critical</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                    <option value="info">Info</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">&nbsp;</label>
                <button class="btn btn-primary w-100" onclick="applyFilters()">
                    <i class="bi bi-search"></i> Search
                </button>
            </div>
        </div>
        <div class="row g-3 mt-2">
            <div class="col-md-3">
                <label class="form-label">Start Date</label>
                <input type="datetime-local" class="form-control" id="filterStartDate">
            </div>
            <div class="col-md-3">
                <label class="form-label">End Date</label>
                <input type="datetime-local" class="form-control" id="filterEndDate">
            </div>
            <div class="col-md-2">
                <label class="form-label">&nbsp;</label>
                <button class="btn btn-secondary w-100" onclick="clearFilters()">
                    <i class="bi bi-x-circle"></i> Clear
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Logs Table -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5><i class="bi bi-list"></i> Logs (<span id="totalCount">0</span>)</h5>
        <button class="btn btn-sm btn-primary" onclick="refreshLogs()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Event Type</th>
                        <th>Severity</th>
                        <th>Username</th>
                        <th>Source IP</th>
                        <th>Hostname</th>
                        <th>Message</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="logsTable">
                    <tr>
                        <td colspan="8" class="text-center">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Pagination -->
        <nav>
            <ul class="pagination justify-content-center" id="pagination">
            </ul>
        </nav>
    </div>
</div>

<!-- Log Detail Modal -->
<div class="modal fade" id="logDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Log Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="logDetailContent">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let currentPage = 0;
const pageSize = 50;

async function loadLogs(page = 0) {
    try {
        const params = new URLSearchParams({
            skip: page * pageSize,
            limit: pageSize
        });
        
        // Add filters
        const username = document.getElementById('filterUsername').value;
        const ip = document.getElementById('filterIP').value;
        const eventType = document.getElementById('filterEventType').value;
        const severity = document.getElementById('filterSeverity').value;
        const startDate = document.getElementById('filterStartDate').value;
        const endDate = document.getElementById('filterEndDate').value;
        
        if (username) params.append('username', username);
        if (ip) params.append('source_ip', ip);
        if (eventType) params.append('event_type', eventType);
        if (severity) params.append('severity', severity);
        if (startDate) params.append('start_date', new Date(startDate).toISOString());
        if (endDate) params.append('end_date', new Date(endDate).toISOString());
        
        const response = await fetch(`/api/logs?${params}`, {
            headers: {
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            }
        });
        
        if (!response.ok) {
            if (response.status === 401) {
                window.location.href = '/';
                return;
            }
            throw new Error('Failed to load logs');
        }
        
        const data = await response.json();
        
        document.getElementById('totalCount').textContent = data.total.toLocaleString();
        displayLogs(data.logs);
        updatePagination(data.total, page);
        
    } catch (error) {
        console.error('Error loading logs:', error);
    }
}

function displayLogs(logs) {
    const tbody = document.getElementById('logsTable');
    
    if (logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center">No logs found</td></tr>';
        return;
    }
    
    tbody.innerHTML = logs.map(log => {
        const severityBadge = getSeverityBadge(log.severity);
        const timestamp = new Date(log.timestamp).toLocaleString();
        
        return `
            <tr>
                <td><small>${timestamp}</small></td>
                <td><span class="badge bg-secondary">${log.event_type.replace(/_/g, ' ')}</span></td>
                <td>${severityBadge}</td>
                <td>${log.username || '-'}</td>
                <td>${log.source_ip || '-'}</td>
                <td>${log.hostname || '-'}</td>
                <td><small>${truncate(log.message, 50)}</small></td>
                <td>
                    <button class="btn btn-sm btn-info" onclick='viewLogDetail(${JSON.stringify(log)})'>
                        <i class="bi bi-eye"></i>
                    </button>
                </td>
            </tr>
        `;
    }).join('');
}

function getSeverityBadge(severity) {
    const badges = {
        'critical': '<span class="badge bg-danger">Critical</span>',
        'high': '<span class="badge bg-warning">High</span>',
        'medium': '<span class="badge bg-info">Medium</span>',
        'low': '<span class="badge bg-secondary">Low</span>',
        'info': '<span class="badge bg-primary">Info</span>'
    };
    return badges[severity] || '<span class="badge bg-secondary">Unknown</span>';
}

function truncate(str, length) {
    if (!str) return '-';
    return str.length > length ? str.substring(0, length) + '...' : str;
}

function updatePagination(total, currentPage) {
    const totalPages = Math.ceil(total / pageSize);
    const pagination = document.getElementById('pagination');
    
    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    
    // Previous button
    html += `
        <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="loadLogs(${currentPage - 1}); return false;">Previous</a>
        </li>
    `;
    
    // Page numbers
    for (let i = 0; i < Math.min(totalPages, 5); i++) {
        const page = i;
        html += `
            <li class="page-item ${page === currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="loadLogs(${page}); return false;">${page + 1}</a>
            </li>
        `;
    }
    
    // Next button
    html += `
        <li class="page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="loadLogs(${currentPage + 1}); return false;">Next</a>
        </li>
    `;
    
    pagination.innerHTML = html;
}

function viewLogDetail(log) {
    const content = document.getElementById('logDetailContent');
    
    content.innerHTML = `
        <table class="table table-bordered">
            <tr>
                <th width="30%">ID</th>
                <td>${log.id}</td>
            </tr>
            <tr>
                <th>Timestamp</th>
                <td>${new Date(log.timestamp).toLocaleString()}</td>
            </tr>
            <tr>
                <th>Event Type</th>
                <td><span class="badge bg-secondary">${log.event_type.replace(/_/g, ' ')}</span></td>
            </tr>
            <tr>
                <th>Severity</th>
                <td>${getSeverityBadge(log.severity)}</td>
            </tr>
            <tr>
                <th>Username</th>
                <td>${log.username || '-'}</td>
            </tr>
            <tr>
                <th>Source IP</th>
                <td>${log.source_ip || '-'}</td>
            </tr>
            <tr>
                <th>Hostname</th>
                <td>${log.hostname || '-'}</td>
            </tr>
            <tr>
                <th>Message</th>
                <td>${log.message}</td>
            </tr>
            <tr>
                <th>Raw Log</th>
                <td><pre class="mb-0">${log.raw_log || '-'}</pre></td>
            </tr>
        </table>
    `;
    
    const modal = new bootstrap.Modal(document.getElementById('logDetailModal'));
    modal.show();
}

function applyFilters() {
    currentPage = 0;
    loadLogs(0);
}

function clearFilters() {
    document.getElementById('filterUsername').value = '';
    document.getElementById('filterIP').value = '';
    document.getElementById('filterEventType').value = '';
    document.getElementById('filterSeverity').value = '';
    document.getElementById('filterStartDate').value = '';
    document.getElementById('filterEndDate').value = '';
    applyFilters();
}

function refreshLogs() {
    loadLogs(currentPage);
}

// Load logs on page load
document.addEventListener('DOMContentLoaded', () => {
    loadLogs(0);
});
</script>
{% endblock %}
